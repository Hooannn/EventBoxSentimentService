services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: eventboxsentiment:local
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\").read()'",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
